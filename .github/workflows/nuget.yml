name: nuget

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # NuGet Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Pack
        run: dotnet pack src/iLoveVideoEditor.Sdk -c Release

      # NuGet Trusted Publishing: exchanges the GitHub OIDC token for a
      # short-lived API key. Policy registered on nuget.org for this repo +
      # workflow file (nuget.org → account → Trusted Publishing).
      - name: NuGet login (OIDC → temp API key)
        if: startsWith(github.ref, 'refs/tags/v')
        id: login
        uses: NuGet/login@v1
        with:
          user: ilovevideoeditor

      - name: Publish to NuGet (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet nuget push "src/iLoveVideoEditor.Sdk/bin/Release/iLoveVideoEditor.Sdk.${VERSION}.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
